<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CBZ to KePub{% endblock %}</title>
  <style>
    :root {
      --bg: #14151a;
      --panel: #1d1f26;
      --border: #2c2f3a;
      --text: #e7e8ec;
      --muted: #9298a8;
      --accent: #7c9cff;
      --accent-hover: #92aeff;
      --danger: #ff8484;
      --ok: #7fd99a;
      --warn: #e8c468;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
    header h1 { margin: 0; font-size: 1.15rem; font-weight: 600; }
    header span { color: var(--muted); font-size: 0.85rem; }
    main { max-width: 760px; margin: 0 auto; padding: 1.5rem; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
    .flash { background: #3a2230; border: 1px solid var(--danger); color: var(--danger); padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.3rem; }
    input[type=text], input[type=number], select {
      width: 100%; padding: 0.55rem 0.7rem; background: #111216; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 0.95rem; margin-bottom: 1rem;
    }
    .check-row { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.85rem; }
    .check-row input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--accent); }
    .check-row .label-text { color: var(--text); font-size: 0.92rem; }
    .check-row .hint { color: var(--muted); font-size: 0.8rem; display: block; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    button, .btn {
      background: var(--accent); color: #0c0d10; border: none; padding: 0.6rem 1.1rem; border-radius: 6px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block;
    }
    button:hover, .btn:hover { background: var(--accent-hover); }
    .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem 0.4rem; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
    th { color: var(--muted); font-weight: 500; font-size: 0.8rem; }
    .folder-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .folder-grid button { background: #111216; color: var(--text); border: 1px solid var(--border); text-align: left; }
    .muted { color: var(--muted); font-size: 0.85rem; }
    code { background: #111216; padding: 0.1rem 0.35rem; border-radius: 4px; }
    .status-pending { color: var(--muted); }
    .status-converting { color: var(--accent); }
    .status-done { color: var(--ok); }
    .status-skipped { color: var(--warn); }
    .status-failed { color: var(--danger); }
    .progress-bar { height: 8px; background: #111216; border-radius: 4px; overflow: hidden; margin: 0.75rem 0; }
    .progress-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }
    .error-detail { font-size: 0.78rem; color: var(--danger); white-space: pre-wrap; margin-top: 0.2rem; }
  </style>
</head>
<body>
  <header>
    <h1>📚➡️📱 CBZ to KePub</h1>
    <span>Calibre + kepubify, no Grimmory involved</span>
  </header>
  <main>
    {% with messages = get_flashed_messages() %}
      {% if messages %}{% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}{% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
